databases:
  - name: velocity-db
    plan: free
    databaseName: velocity_db
    user: velocity_admin

services:
  - type: web
    name: velocity-backend
    plan: free
    runtime: docker
    dockerfilePath: velocity-engine/backend/Dockerfile
    dockerContext: velocity-engine/backend
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: velocity-db
          property: connectionString

  - type: web
    name: velocity-frontend
    plan: free
    runtime: docker
    dockerfilePath: velocity-engine/backend/frontend/Dockerfile
    dockerContext: velocity-engine/backend/frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: velocity-backend
          type: web
          property: host