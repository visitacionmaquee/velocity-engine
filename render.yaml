# 1. THE DATABASE LAYER
databases:
  - name: velocity-db
    plan: free
    databaseName: velocity_db
    user: velocity_admin

# 2. THE COMPUTE & SERVICE LAYER
services:
  # ENGINE API LAYER (Node.js backend)
  - type: web
    name: velocity-backend
    plan: free
    runtime: docker
    dockerfilePath: backend/Dockerfile # FIXED: Removed ./ prefix
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: velocity-db
          property: connectionString

  # UI DASHBOARD LAYER (React + Nginx frontend)
  - type: web
    name: velocity-frontend
    plan: free
    runtime: docker
    dockerfilePath: frontend/Dockerfile # FIXED: Removed ./ prefix
    envVars:
      - key: VITE_API_URL
        fromService:
          name: velocity-backend
          type: web
          property: host