# 1. THE DATABASE LAYER
databases:
  - name: velocity-db
    plan: free
    databaseName: velocity_db
    user: velocity_admin # FIXED: Changed from 'postgres' to avoid system reserve conflicts

# 2. THE COMPUTE & SERVICE LAYER
services:
  # ENGINE API LAYER (Node.js backend)
  - type: web
    name: velocity-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: velocity-db
          property: connectionString

  # UI DASHBOARD LAYER (React + Nginx frontend)
  - type: web
    name: velocity-frontend
    plan: free
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          name: velocity-backend
          type: web
          property: host # FIXED: Changed from 'url' to Render's valid 'host' resolution property